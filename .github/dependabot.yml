# Dependabot — automated dependency updates + security alerts.
# Minor/patch bumps are grouped into one PR per project (less noise); majors
# come as individual PRs so they can be reviewed/tested in isolation. Security
# updates are opened immediately regardless of the weekly schedule.
version: 2
updates:
  # --- Portal (Next.js app) ---
  - package-ecosystem: npm
    directory: /ghost-empire-web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "web"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- Chat bot (Twitch/Kick/YouTube) ---
  - package-ecosystem: npm
    directory: /ghost-empire-chat
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "chat-bot"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- Discord bot ---
  - package-ecosystem: npm
    directory: /ghost-empire-bot
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "discord-bot"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # --- GitHub Actions workflows ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]
