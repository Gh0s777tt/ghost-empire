name: CI

# Quality gate for every push to main and every pull request.
# Runs the checks Vercel does NOT run on its own: the unit tests. Typecheck and
# lint are run here too so a PR goes red *before* merge instead of only failing
# the Vercel build. (`next build` itself is left to Vercel's preview deploys — it
# needs a real DATABASE_URL, which CI shouldn't carry.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-empire-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ghost-empire-web/package-lock.json

      # `npm install` (not `npm ci`) so the lockfile self-heals — vitest was added
      # to package.json on a machine without Node, so the lockfile may lag. Once a
      # local `npm install` has synced it, this can be tightened to `npm ci`.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # next-env.d.ts is gitignored and normally generated by `next dev`/`next build`.
      # Recreate the ambient references so `tsc --noEmit` resolves Next's types.
      - name: Ensure next-env.d.ts
        run: |
          test -f next-env.d.ts || printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
