name: CI

# Quality gate for every push to main and every pull request.
# Runs the checks Vercel does NOT run on its own: the unit tests. Typecheck and
# lint are run here too so a PR goes red *before* merge instead of only failing
# the Vercel build. (`next build` itself is left to Vercel's preview deploys — it
# needs a real DATABASE_URL, which CI shouldn't carry.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-empire-web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ghost-empire-web/package-lock.json

      # `npm install` (not `npm ci`) so the lockfile self-heals — vitest was added
      # to package.json on a machine without Node, so the lockfile may lag. Once a
      # local `npm install` has synced it, this can be tightened to `npm ci`.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # next-env.d.ts is gitignored and normally generated by `next dev`/`next build`.
      # Recreate the ambient references so `tsc --noEmit` resolves Next's types.
      - name: Ensure next-env.d.ts
        run: |
          test -f next-env.d.ts || printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Surface known vulnerabilities in production dependencies. Non-blocking
      # (continue-on-error) so a freshly-disclosed transitive CVE can't wedge every
      # merge — it shows a ⚠️ on the job and Dependabot opens the fix PR. Tighten to
      # a hard gate later if desired.
      - name: Audit production dependencies
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  # Integration tests hit a REAL Postgres (service container) via Prisma, exercising
  # the money-critical paths (predictions payouts, wheel spins, pruning) end to end.
  integration:
    name: integration · postgres
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-empire-web
    services:
      postgres:
        image: postgres:16-alpine
        # Throwaway CI database — trust auth (no password) keeps any credential out
        # of the workflow file entirely.
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: ghost_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # The test DB URL is composed by tests/integration/db-url.ts from these parts
    # (its defaults already match this service), so no full URI literal is committed.
    # Empty TEST_DB_PASS = trust auth (matches POSTGRES_HOST_AUTH_METHOD above).
    env:
      TEST_DB_HOST: localhost:5433
      TEST_DB_USER: postgres
      TEST_DB_PASS: ""
      TEST_DB_NAME: ghost_test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ghost-empire-web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # globalSetup runs `prisma db push` against the service DB before the suite.
      - name: Integration tests
        run: npm run test:integration
