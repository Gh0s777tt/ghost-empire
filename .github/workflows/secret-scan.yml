name: Secret scan

# gitleaks — scans pushes and PRs for accidentally committed secrets
# (API keys, OAuth client secrets, tokens). Real secrets live in gitignored
# .env files / Vercel env, so this stays a safety net against mistakes.
# Free for personal repositories (no GITLEAKS_LICENSE needed).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can diff commit ranges
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
