# E2E smoke against PRODUCTION (read-only: public pages + public APIs, no login,
# no GT spent). Runs daily and on demand; fails loudly if prod is broken.
name: e2e-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *" # daily 06:30 UTC

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-empire-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      # Browser binary only (no --with-deps): ubuntu-latest ships Chromium's shared
      # libs, and apt-get update pulls the occasionally-flaky Google Chrome repo
      # (matches the ci.yml e2e job — keep both consistent).
      - run: npx playwright install chromium
      - run: npx playwright test
        env:
          E2E_BASE_URL: https://ghost-empire-web.vercel.app
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: ghost-empire-web/test-results/
          retention-days: 7
